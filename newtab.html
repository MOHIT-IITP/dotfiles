<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New Tab</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f0f;
    --surface: #161616;
    --border: #252525;
    --text: #c8c8c8;
    --muted: #555;
    --accent: #7eb8f7;
    --key-bg: #1e1e1e;
    --key-border: #333;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', 'Courier New', monospace;
    font-size: 13px;
    overflow: hidden;
    cursor: none;
  }

  .cursor {
    position: fixed;
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    transition: transform 0.1s, opacity 0.2s;
    mix-blend-mode: screen;
  }

  #clock {
    position: fixed;
    top: 40px; left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: flex-end;
    gap: 10px;
    opacity: 0;
    animation: fadeUpCenter 0.8s 0.1s forwards;
    user-select: none;
  }

  #clock-time {
    font-size: 72px;
    font-weight: 300;
    letter-spacing: -2px;
    color: #e8e8e8;
    line-height: 1;
  }

  #clock-ampm {
    font-size: 16px;
    font-weight: 300;
    color: var(--muted);
    letter-spacing: 2px;
    padding-bottom: 10px;
  }

  #date {
    position: fixed;
    top: 136px; left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 3px;
    text-transform: uppercase;
    opacity: 0;
    animation: fadeUpCenter 0.8s 0.25s forwards;
    user-select: none;
    white-space: nowrap;
  }

  #search-wrap {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 480px;
    opacity: 0;
    animation: fadeUpWrap 0.8s 0.4s forwards;
  }

  #search-bar {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    padding: 12px 16px;
    outline: none;
    letter-spacing: 0.5px;
    transition: border-color 0.2s;
  }

  #search-bar::placeholder { color: var(--muted); }
  #search-bar:focus { border-color: #3a3a3a; }

  /* Original: bottom-right, vertical column */
#shortcuts {
  position: fixed;
  top: 74%;
  left: 50%;
  transform: translate(-50%, -50%);

  background: rgba(20, 20, 20, 0.85);
  border: 1px solid var(--border);
  padding: 14px 18px;

  display: flex;
  gap: 6px;

  opacity: 0;
  animation: fadeUpWrap 0.8s 0.6s forwards;
  backdrop-filter: blur(8px);
}
  #shortcuts-box {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .shortcut {
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--text);
    text-decoration: none;
    line-height: 1;
    transition: color 0.15s;
  }

  .shortcut:hover { color: #fff; }
  .shortcut:hover .key { border-color: var(--accent); color: var(--accent); }

  .key {
    display: inline-flex;
    align-items: center; justify-content: center;
    width: 18px; height: 18px;
    background: var(--key-bg);
    border: 1px solid var(--key-border);
    color: var(--muted);
    font-size: 11px;
    font-family: inherit;
    transition: border-color 0.15s, color 0.15s;
    flex-shrink: 0;
  }

  .shortcut-label {
    font-size: 12px;
    color: inherit;
  }

  .shortcut.active .key {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  #status {
    position: fixed;
    bottom: 36px; left: 40px;
    font-size: 10px;
    color: #2a2a2a;
    letter-spacing: 1px;
    opacity: 0;
    animation: fadeUp 0.8s 0.8s forwards;
    user-select: none;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUpCenter {
    from { opacity: 0; transform: translateX(-50%) translateY(8px); }
    to   { opacity: 1; transform: translateX(-50%) translateY(0); }
  }

  @keyframes fadeUpWrap {
    from { opacity: 0; transform: translate(-50%, calc(-50% + 8px)); }
    to   { opacity: 1; transform: translate(-50%, -50%); }
  }
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>

<div id="clock">
  <span id="clock-time">00:00</span>
  <span id="clock-ampm">AM</span>
</div>
<div id="date">Monday, January 1</div>

<div id="search-wrap">
  <input id="search-bar" type="text" data-key="s" placeholder="search or enter address" autocomplete="off" spellcheck="false" />
</div>

<nav id="shortcuts">
  <div id="shortcuts-box">
    <a class="shortcut" href="https://github.com" data-key="a" target="_blank" rel="noopener">
      <span class="key">a</span>
      <span class="shortcut-label">github</span>
    </a>
    <a class="shortcut" href="https://youtube.com" data-key="y" target="_blank" rel="noopener">
      <span class="key">y</span>
      <span class="shortcut-label">youtube</span>
    </a>
    <a class="shortcut" href="https://docs.google.com/spreadsheets/d/13pPLb5_uMr3zPnIuq23iLSUiJsl0vOocm3LWvOqW43w/edit?gid=960784140#gid=960784140" data-key="j" target="_blank" rel="noopener">
      <span class="key">j</span>
      <span class="shortcut-label">Journal Mohiitp</span>
    </a>
  </div>
  <div id="shortcuts-box">
    
    <a class="shortcut" href="https://mail.google.com/mail/u/0/#inbox" data-key="g" target="_blank" rel="noopener">
      <span class="key">g</span>
      <span class="shortcut-label">gmail</span>
    </a>
    <a class="shortcut" href="https://100xdevs.com/new-courses/24/video/4286?courseId=24&ytFlag=0&isFolderCourse=1&lcId=&lcApi=https://harkiratapi.classx.co.in/" data-key="h" target="_blank" rel="noopener">
      <span class="key">h</span>
      <span class="shortcut-label">100xdevs</span>
    </a>
    <a class="shortcut" href="https://web.whatsapp.com/" data-key="w" target="_blank" rel="noopener">
      <span class="key">w</span>
      <span class="shortcut-label">whatsapp</span>
    </a>
    <a class="shortcut" href="https://leetcode.com/" data-key="l" target="_blank" rel="noopener">
      <span class="key">l</span>
      <span class="shortcut-label">Leetcode</span>
    </a>
  </div>
</nav>

<div id="status">ntp &mdash; <span id="uptime">0s</span></div>

<script>
  function updateClock() {
    const now = new Date();
    let h = now.getHours();
    const m = String(now.getMinutes()).padStart(2,'0');
    const ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12 || 12;
    document.getElementById('clock-time').textContent = `${h}:${m}`;
    document.getElementById('clock-ampm').textContent = ampm;

    const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    document.getElementById('date').textContent =
      `${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()}`;
  }
  updateClock();
  setInterval(updateClock, 1000);

  // Uptime counter
  let secs = 0;
  setInterval(() => {
    secs++;
    const el = document.getElementById('uptime');
    if (secs < 60) el.textContent = secs + 's';
    else if (secs < 3600) el.textContent = Math.floor(secs/60) + 'm';
    else el.textContent = Math.floor(secs/3600) + 'h';
  }, 1000);

  // Search
  const searchBar = document.getElementById('search-bar');
  searchBar.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const q = searchBar.value.trim();
      if (!q) return;
      const isURL = /^(https?:\/\/|\w+\.\w{2,})/.test(q);
      const url = isURL
        ? (q.startsWith('http') ? q : 'https://' + q)
        : `https://www.google.com/search?q=${encodeURIComponent(q)}`;
      window.open(url, '_blank', 'noopener');
      searchBar.value = '';
    }
    if (e.key === 'Escape') searchBar.blur();
  });

  // Keyboard shortcuts
  document.addEventListener('keydown', e => {
    if (document.activeElement === searchBar) return;
    const link = document.querySelector(`.shortcut[data-key="${e.key}"]`);
    if (link) {
      link.classList.add('active');
      setTimeout(() => {
        link.classList.remove('active');
        window.open(link.href, '_blank', 'noopener');
      }, 120);
      return;
    }
    if (/^[\w ]$/.test(e.key) && !e.ctrlKey && !e.metaKey) {
      searchBar.focus();
    }
  });

  // Custom cursor
  const cursor = document.getElementById('cursor');
  document.addEventListener('mousemove', e => {
    cursor.style.left = e.clientX + 'px';
    cursor.style.top  = e.clientY + 'px';
  });
</script>
</body>
</html>
