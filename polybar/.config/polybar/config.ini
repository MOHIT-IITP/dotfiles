;==========================================================
; GLOBAL SETTINGS
;==========================================================
[settings]
screenchange-reload = true
pseudo-transparency = true

[global/wm]
margin-top = 0
margin-bottom = 0

;==========================================================
; COLORS (FIXED XRDB SYNTAX)
;==========================================================
[colors]
background = ${xrdb:color0}
foreground = ${xrdb:color7}
primary = ${xrdb:color4}
secondary = ${xrdb:color5}
alert = ${xrdb:color1}

;==========================================================
; BAR
;==========================================================
[bar/main]
width = 100%
height = 26
radius = 0

bottom = true

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 2
line-color = ${colors.primary}

padding-left = 0
padding-right = 0
module-margin = 0

font-0 = Iosevka Nerd Font:size=14;4

modules-left = i3 mode
modules-center = xwindow
modules-right = tray cpu sep memory sep date

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true
wm-restack = i3
override-redirect = false

tray-position = right
tray-padding = 0 

;==========================================================
; SEPARATOR (::)
;==========================================================
[module/sep]
type = custom/text
content = " :: "
content-foreground = ${colors.secondary}

;==========================================================
; WORKSPACES
;==========================================================
[module/i3]
type = internal/i3
format = <label-state>

label-focused = %name%
label-focused-background = ${colors.primary}
label-focused-foreground = #ffffff
label-focused-padding = 1 

label-unfocused = %name%
label-unfocused-padding = 1

label-visible = %name%
label-visible-padding = 1

label-urgent = %name%!
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

;==========================================================
; MODE
;==========================================================
[module/mode]
type = internal/i3
format = <label-mode>
label-mode = %mode%
label-mode-background = ${colors.alert}
label-mode-foreground = #ffffff
label-mode-padding = 1

;==========================================================
; WINDOW TITLE (CENTER)
;==========================================================
[module/xwindow]
type = internal/xwindow
label = %title:0:50%

;==========================================================
; CPU
;==========================================================
[module/cpu]
type = internal/cpu
interval = 2
label = CPU %percentage%%

;==========================================================
; MEMORY
;==========================================================
[module/memory]
type = internal/memory
interval = 2
label = MEM  %percentage_used%%

;==========================================================
; DATE / CLOCK
;==========================================================
[module/date]
type = internal/date
interval = 1

date = %a %d %b
time = %I:%M %p

label = %date%  %time%
