"$schema" = "https://starship.rs/config-schema.json"

add_newline = false
command_timeout = 2000

# PROMPT
format = '$username$directory$character'

[username]
show_always = true
style_user = 'bold fg:color6'
format = '$user '

[character]
success_symbol = '[ λ](bold fg:color2)'
error_symbol = '[ λ](bold fg:color1)'

[hostname]
ssh_only = false
format = "[$hostname](fg:color5)"

[directory]
format = '[$path](fg:color4)'
truncation_length = 1
truncate_to_repo = false
home_symbol = "~"

# Optional alternate prompt style
# [character]
# success_symbol = "[\\$](bold fg:color7)"
# error_symbol  = "[\\$](bold fg:color1)"
# vicmd_symbol  = "[\\$](bold fg:color2)"

[git_branch]
disabled = true

[git_status]
disabled = true

[nodejs]
disabled = true

[python]
disabled = true

[rust]
disabled = true

[golang]
disabled = true

[cmd_duration]
disabled = true

