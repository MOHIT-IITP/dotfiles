# =========================
# WAL COLORS
# =========================

run-shell "tmux set-environment -g WAL_BG $(sed -n '1p' ~/.cache/wal/colors)"
run-shell "tmux set-environment -g WAL_FG $(sed -n '8p' ~/.cache/wal/colors)"
run-shell "tmux set-environment -g WAL_ACCENT $(sed -n '2p' ~/.cache/wal/colors)"
run-shell "tmux set-environment -g WAL_ACCENT2 $(sed -n '3p' ~/.cache/wal/colors)"

# =========================
# PREFIX
# =========================

set -g prefix C-a
unbind C-b
bind C-a send-prefix

# =========================
# TERMINAL
# =========================

set -g default-terminal "screen-256color"
set -ga terminal-overrides ',xterm-256color:Tc'

# =========================
# GENERAL BEHAVIOR
# =========================

set -g mouse on
set -gq allow-passthrough on
set -g visual-activity off

set -g base-index 1
setw -g pane-base-index 1
set -sg escape-time 0

bind r source-file ~/.config/tmux/tmux.conf \; display-message "config reloaded mohiitp"

setw -g mode-keys vi

# =========================
# PANE NAVIGATION
# =========================

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# =========================
# COPY MODE (VIM STYLE)
# =========================

bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-selection-and-cancel

# =========================
# STATUS BAR
# =========================

set -g status-position top
set -g status-interval 1

set -g status-style "bg=#{WAL_BG},fg=#{WAL_FG}"

# Left side
set -g status-left-length 40
set -g status-left "#[fg=#{WAL_BG},bg=#{WAL_ACCENT},bold] #S #[fg=#{WAL_FG},bg=#{WAL_BG}] #W "

# Right side
set -g status-right-length 60
set -g status-right "#[fg=#{WAL_ACCENT}]Mohiitp's Unix #[default]"

set -g status-justify centre

# =========================
# WINDOWS
# =========================

setw -g window-status-style "fg=#{WAL_FG},bg=#{WAL_BG}"
setw -g window-status-format " #I "

setw -g window-status-current-style "fg=#{WAL_BG},bg=#{WAL_ACCENT},bold"
setw -g window-status-current-format " #I "

# =========================
# PANES
# =========================

set -g pane-border-style "fg=#{WAL_BG}"
set -g pane-active-border-style "fg=#{WAL_ACCENT}"

# =========================
# COPY / SELECTION MODE
# =========================

set -g mode-style "fg=#{WAL_BG},bg=#{WAL_ACCENT}"

# =========================
# MESSAGES & PROMPTS
# =========================

set -g message-style "fg=#{WAL_FG},bg=#{WAL_BG}"
set -g message-command-style "fg=#{WAL_BG},bg=#{WAL_ACCENT}"

# =========================
# POPUPS
# =========================

set -g popup-style "bg=#{WAL_BG},fg=#{WAL_FG}"
set -g popup-border-style "fg=#{WAL_ACCENT}"

# =========================
# KEYMAPS
# =========================

bind d detach

bind C-n command-prompt -p "New session name:" "new-session -s '%%'"

bind C-j display-popup -E "
tmux list-sessions |
sed -E 's/:.*$//' |
grep -v \"^$(tmux display-message -p '#S')\$\" |
fzf --reverse |
xargs tmux switch-client -t
"

# =========================
# PLUGINS
# =========================

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'omerxx/tmux-floax'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'omerxx/tmux-sessionx'

# Floax & SessionX
set -g @floax-bind 'o'
set -g @sessionx-bind 's'

# =========================
# SESSION PERSISTENCE
# =========================

set -g @continuum-restore 'on'
set -g @continuum-save-interval '10'

set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-strategy-vim 'session'

# =========================
# TPM
# =========================

run '~/.tmux/plugins/tpm/tpm'
